name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # triggers on tags that start with "v", e.g. v0.1.0

# Least-privilege by default; the publish job opts into id-token below.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Tip: for stronger supply-chain hardening, pin these actions to a full
      # commit SHA (e.g. actions/checkout@<sha> # v4) instead of the major tag.
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build the package
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Smoke-test the built wheel
        run: |
          python -m pip install dist/*.whl
          python -c "import pipbrew_cleaner, pipbrew_cleaner.main, pipbrew_cleaner.pip_manager, pipbrew_cleaner.brew_manager"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Optional: protect releases behind a GitHub Environment with reviewers.
    environment: pypi
    permissions:
      id-token: write  # required for PyPI OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Trusted publishing: no long-lived PyPI token needed. Configure this
      # repository/workflow as a trusted publisher in the PyPI project settings.
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
